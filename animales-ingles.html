<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐾 Animal Adventure!</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #2ecc71;
    --blue: #3498db;
    --orange: #f39c12;
    --red: #e74c3c;
    --purple: #9b59b6;
    --yellow: #f1c40f;
    --pink: #e91e8c;
    --teal: #1abc9c;
    --bg: #fff9f0;
    --card-shadow: 0 8px 25px rgba(0,0,0,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Stars background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(circle at 10% 20%, rgba(255,220,100,0.15) 0%, transparent 50%),
      radial-gradient(circle at 90% 80%, rgba(100,200,255,0.15) 0%, transparent 50%),
      radial-gradient(circle at 50% 50%, rgba(200,100,255,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 20px;
    position: relative;
    z-index: 1;
  }

  /* HEADER */
  header {
    text-align: center;
    padding: 20px 0 10px;
  }

  header h1 {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(2rem, 8vw, 3.5rem);
    background: linear-gradient(135deg, #e74c3c, #f39c12, #2ecc71, #3498db, #9b59b6);
    background-size: 300% 300%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: gradientShift 4s ease infinite;
    filter: drop-shadow(2px 3px 0px rgba(0,0,0,0.1));
  }

  header p {
    font-size: 1.1rem;
    color: #666;
    margin-top: 5px;
    font-weight: 700;
  }

  @keyframes gradientShift {
    0%,100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  /* SCORE BAR */
  .score-bar {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
    margin: 15px 0 25px;
    flex-wrap: wrap;
  }

  .score-pill {
    background: white;
    border-radius: 50px;
    padding: 8px 20px;
    font-weight: 900;
    font-size: 1rem;
    box-shadow: var(--card-shadow);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .score-pill span { font-size: 1.3rem; }

  /* TABS */
  .tabs {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 25px;
    flex-wrap: wrap;
  }

  .tab {
    font-family: 'Fredoka One', cursive;
    font-size: 1.1rem;
    padding: 10px 24px;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    background: white;
    color: #aaa;
    box-shadow: var(--card-shadow);
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .tab:hover { transform: translateY(-2px); }

  .tab.active {
    background: linear-gradient(135deg, #f39c12, #e74c3c);
    color: white;
    box-shadow: 0 6px 20px rgba(231,76,60,0.35);
    transform: translateY(-2px);
  }

  /* SCREENS */
  .screen { display: none; }
  .screen.active { display: block; }

  /* ===== SCREEN 1: LEARN ===== */
  .animals-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 18px;
  }

  .animal-card {
    background: white;
    border-radius: 20px;
    padding: 20px 15px;
    text-align: center;
    box-shadow: var(--card-shadow);
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    position: relative;
    overflow: hidden;
    border: 3px solid transparent;
  }

  .animal-card:hover {
    transform: translateY(-5px) scale(1.02);
    box-shadow: 0 15px 35px rgba(0,0,0,0.15);
  }

  .animal-card.playing {
    animation: pulse 0.4s ease;
    border-color: var(--yellow);
  }

  @keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.08); }
    100% { transform: scale(1); }
  }

  .animal-emoji {
    font-size: 4rem;
    display: block;
    margin-bottom: 8px;
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }

  .animal-card:nth-child(2n) .animal-emoji { animation-delay: 0.5s; }
  .animal-card:nth-child(3n) .animal-emoji { animation-delay: 1s; }
  .animal-card:nth-child(4n) .animal-emoji { animation-delay: 1.5s; }

  .animal-name-en {
    font-family: 'Fredoka One', cursive;
    font-size: 1.5rem;
    color: #2c3e50;
    display: block;
    margin-bottom: 4px;
  }

  .animal-name-es {
    font-size: 0.85rem;
    color: #999;
    font-weight: 700;
  }

  .sound-btn {
    margin-top: 12px;
    background: linear-gradient(135deg, #3498db, #2ecc71);
    color: white;
    border: none;
    border-radius: 50px;
    padding: 8px 18px;
    font-family: 'Fredoka One', cursive;
    font-size: 0.95rem;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .sound-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 4px 15px rgba(52,152,219,0.4);
  }

  /* Color stripes per card */
  .animal-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 5px;
    border-radius: 20px 20px 0 0;
  }
  .animal-card:nth-child(1)::before { background: #e74c3c; }
  .animal-card:nth-child(2)::before { background: #f39c12; }
  .animal-card:nth-child(3)::before { background: #2ecc71; }
  .animal-card:nth-child(4)::before { background: #3498db; }
  .animal-card:nth-child(5)::before { background: #9b59b6; }
  .animal-card:nth-child(6)::before { background: #e91e8c; }
  .animal-card:nth-child(7)::before { background: #1abc9c; }
  .animal-card:nth-child(8)::before { background: #f1c40f; }

  /* ===== SCREEN 2: QUIZ ===== */
  .quiz-box {
    background: white;
    border-radius: 25px;
    padding: 35px;
    box-shadow: var(--card-shadow);
    text-align: center;
    max-width: 600px;
    margin: 0 auto;
  }

  .quiz-question {
    font-family: 'Fredoka One', cursive;
    font-size: 1.3rem;
    color: #555;
    margin-bottom: 5px;
  }

  .quiz-animal-display {
    font-size: 6rem;
    margin: 15px 0;
    display: block;
    animation: bounce 0.6s ease;
  }

  @keyframes bounce {
    0% { transform: scale(0); }
    60% { transform: scale(1.1); }
    100% { transform: scale(1); }
  }

  .quiz-options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 20px;
  }

  .quiz-option {
    font-family: 'Fredoka One', cursive;
    font-size: 1.3rem;
    padding: 16px;
    border: 3px solid #eee;
    border-radius: 15px;
    background: white;
    cursor: pointer;
    transition: all 0.2s;
    color: #2c3e50;
    letter-spacing: 0.5px;
  }

  .quiz-option:hover:not(:disabled) {
    border-color: var(--blue);
    background: #f0f8ff;
    transform: scale(1.02);
  }

  .quiz-option.correct {
    background: #d5f5e3;
    border-color: var(--green);
    color: #27ae60;
    animation: correctBounce 0.5s ease;
  }

  .quiz-option.wrong {
    background: #fde8e8;
    border-color: var(--red);
    color: var(--red);
    animation: shake 0.4s ease;
  }

  @keyframes correctBounce {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.06); }
  }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
  }

  .quiz-feedback {
    font-family: 'Fredoka One', cursive;
    font-size: 1.6rem;
    margin-top: 20px;
    min-height: 40px;
    transition: all 0.3s;
  }

  .feedback-correct { color: var(--green); }
  .feedback-wrong { color: var(--red); }

  .next-btn {
    display: none;
    margin: 20px auto 0;
    font-family: 'Fredoka One', cursive;
    font-size: 1.2rem;
    padding: 14px 35px;
    background: linear-gradient(135deg, #f39c12, #e74c3c);
    color: white;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 6px 20px rgba(231,76,60,0.3);
    letter-spacing: 0.5px;
  }

  .next-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(231,76,60,0.4); }

  .progress-bar-outer {
    background: #eee;
    border-radius: 50px;
    height: 12px;
    margin-bottom: 25px;
    overflow: hidden;
  }

  .progress-bar-inner {
    height: 100%;
    background: linear-gradient(90deg, #f39c12, #e74c3c);
    border-radius: 50px;
    transition: width 0.5s ease;
  }

  /* ===== SCREEN 3: MATCH GAME ===== */
  .match-instruction {
    text-align: center;
    font-family: 'Fredoka One', cursive;
    font-size: 1.2rem;
    color: #666;
    margin-bottom: 20px;
  }

  .match-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    max-width: 700px;
    margin: 0 auto;
  }

  .match-card {
    background: white;
    border-radius: 15px;
    padding: 18px 10px;
    text-align: center;
    cursor: pointer;
    box-shadow: var(--card-shadow);
    transition: all 0.25s;
    border: 3px solid transparent;
    min-height: 90px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Fredoka One', cursive;
    font-size: 1.1rem;
    color: #2c3e50;
    position: relative;
  }

  .match-card .card-emoji { font-size: 2.5rem; }

  .match-card:hover:not(.matched):not(.flipped) {
    transform: translateY(-3px);
    border-color: var(--blue);
  }

  .match-card.selected {
    border-color: var(--orange);
    background: #fff8ee;
    transform: scale(1.05);
  }

  .match-card.matched {
    background: #d5f5e3;
    border-color: var(--green);
    pointer-events: none;
    animation: matchPop 0.4s ease;
  }

  .match-card.wrong-flash {
    animation: wrongFlash 0.5s ease;
    border-color: var(--red);
  }

  @keyframes matchPop {
    0% { transform: scale(1); }
    50% { transform: scale(1.15); }
    100% { transform: scale(1); }
  }

  @keyframes wrongFlash {
    0%,100% { background: white; }
    50% { background: #fde8e8; }
  }

  /* RESULTS SCREEN */
  .results-box {
    background: white;
    border-radius: 25px;
    padding: 40px;
    text-align: center;
    box-shadow: var(--card-shadow);
    max-width: 500px;
    margin: 20px auto;
  }

  .results-emoji { font-size: 5rem; display: block; }

  .results-title {
    font-family: 'Fredoka One', cursive;
    font-size: 2.5rem;
    color: #2c3e50;
    margin: 15px 0 8px;
  }

  .results-score {
    font-size: 1.2rem;
    color: #666;
    font-weight: 700;
  }

  .stars {
    font-size: 2.5rem;
    margin: 15px 0;
    letter-spacing: 5px;
  }

  .restart-btn {
    font-family: 'Fredoka One', cursive;
    font-size: 1.2rem;
    padding: 14px 35px;
    background: linear-gradient(135deg, #3498db, #9b59b6);
    color: white;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    margin-top: 20px;
    transition: all 0.2s;
    box-shadow: 0 6px 20px rgba(52,152,219,0.35);
    letter-spacing: 0.5px;
  }

  .restart-btn:hover { transform: translateY(-2px); }

  /* Fireworks */
  .confetti-piece {
    position: fixed;
    width: 10px;
    height: 10px;
    border-radius: 2px;
    animation: confettiFall linear forwards;
    z-index: 999;
    pointer-events: none;
  }

  @keyframes confettiFall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  /* Responsive */
  @media (max-width: 480px) {
    .animals-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .quiz-options { grid-template-columns: 1fr 1fr; }
    .match-grid { grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .match-card { padding: 12px 5px; min-height: 75px; font-size: 0.9rem; }
    .match-card .card-emoji { font-size: 2rem; }
    .quiz-box { padding: 20px; }
    .tab { font-size: 0.9rem; padding: 8px 16px; }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>🐾 Animal Adventure!</h1>
    <p>¡Aprende los animales en inglés!</p>
  </header>

  <div class="score-bar">
    <div class="score-pill"><span>⭐</span> Estrellas: <strong id="totalStars">0</strong></div>
    <div class="score-pill"><span>🎯</span> Aciertos: <strong id="totalCorrect">0</strong></div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="showScreen('learn')">📚 Aprender</button>
    <button class="tab" onclick="showScreen('quiz')">❓ Quiz</button>
    <button class="tab" onclick="showScreen('match')">🃏 Emparejar</button>
  </div>

  <!-- SCREEN 1: LEARN -->
  <div id="screen-learn" class="screen active">
    <div class="animals-grid" id="animalsGrid"></div>
  </div>

  <!-- SCREEN 2: QUIZ -->
  <div id="screen-quiz" class="screen">
    <div class="quiz-box">
      <div class="progress-bar-outer">
        <div class="progress-bar-inner" id="quizProgress" style="width:0%"></div>
      </div>
      <p class="quiz-question" id="quizQuestion">¿Cuál es este animal?</p>
      <span class="quiz-animal-display" id="quizAnimal">🦇</span>
      <div class="quiz-options" id="quizOptions"></div>
      <p class="quiz-feedback" id="quizFeedback"></p>
      <button class="next-btn" id="nextBtn" onclick="nextQuestion()">¡Siguiente! →</button>
    </div>
  </div>

  <!-- SCREEN 3: MATCH -->
  <div id="screen-match" class="screen">
    <p class="match-instruction">🔗 Une cada emoji con su nombre en inglés</p>
    <div class="match-grid" id="matchGrid"></div>
    <div id="matchResult" style="text-align:center; margin-top:20px; font-family:'Fredoka One',cursive; font-size:1.3rem; color:#666;"></div>
  </div>
</div>

<script>
const animals = [
  { name: 'bat',       es: 'Murciélago', emoji: '🦇', color: '#8e44ad' },
  { name: 'bird',      es: 'Pájaro',     emoji: '🐦', color: '#f39c12' },
  { name: 'butterfly', es: 'Mariposa',   emoji: '🦋', color: '#e91e8c' },
  { name: 'duck',      es: 'Pato',       emoji: '🦆', color: '#f1c40f' },
  { name: 'frog',      es: 'Rana',       emoji: '🐸', color: '#2ecc71' },
  { name: 'hedgehog',  es: 'Erizo',      emoji: '🦔', color: '#e74c3c' },
  { name: 'lizard',    es: 'Lagarto',    emoji: '🦎', color: '#1abc9c' },
  { name: 'squirrel',  es: 'Ardilla',    emoji: '🐿️', color: '#d35400' },
];

let totalStars = 0;
let totalCorrect = 0;

// === TEXT TO SPEECH ===
let speechReady = false;

// Android Chrome requiere que speechSynthesis se "despierte" con un utterance vacío
function initSpeech() {
  if (speechReady || !window.speechSynthesis) return;
  const warmup = new SpeechSynthesisUtterance(' ');
  warmup.volume = 0;
  window.speechSynthesis.speak(warmup);
  speechReady = true;
}

// Llama a initSpeech en el primer toque del usuario
document.addEventListener('touchstart', initSpeech, { once: true });
document.addEventListener('click', initSpeech, { once: true });

function speak(text) {
  if (!window.speechSynthesis) {
    alert('Tu navegador no soporta audio. Prueba con Chrome.');
    return;
  }
  window.speechSynthesis.cancel();

  // Pequeño delay para que Android procese el cancel()
  setTimeout(() => {
    const utt = new SpeechSynthesisUtterance(text);
    utt.lang = 'en-US';
    utt.rate = 0.75;
    utt.pitch = 1.1;
    utt.volume = 1;

    // Seleccionar voz en inglés si está disponible
    const voices = window.speechSynthesis.getVoices();
    const enVoice = voices.find(v => v.lang.startsWith('en'));
    if (enVoice) utt.voice = enVoice;

    window.speechSynthesis.speak(utt);
  }, 100);
}

// Precargar voces (necesario en algunos Android)
if (window.speechSynthesis) {
  window.speechSynthesis.onvoiceschanged = () => {
    window.speechSynthesis.getVoices();
  };
  window.speechSynthesis.getVoices();
}

// === TABS ===
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  event.target.classList.add('active');
  if (name === 'quiz') initQuiz();
  if (name === 'match') initMatch();
}

// === LEARN SCREEN ===
function buildLearnScreen() {
  const grid = document.getElementById('animalsGrid');
  grid.innerHTML = '';
  animals.forEach(a => {
    const card = document.createElement('div');
    card.className = 'animal-card';
    card.innerHTML = `
      <span class="animal-emoji">${a.emoji}</span>
      <span class="animal-name-en">${a.name}</span>
      <span class="animal-name-es">${a.es}</span>
      <button class="sound-btn" onclick="playAnimal(event, '${a.name}', this.closest('.animal-card'))">
        🔊 Escuchar
      </button>
    `;
    grid.appendChild(card);
  });
}

function playAnimal(e, name, card) {
  e.stopPropagation();
  document.querySelectorAll('.animal-card').forEach(c => c.classList.remove('playing'));
  card.classList.add('playing');
  speak(name);
  setTimeout(() => card.classList.remove('playing'), 800);
}

// === QUIZ SCREEN ===
let quizQueue = [];
let quizIndex = 0;
let quizAnswered = false;

function initQuiz() {
  quizQueue = shuffle([...animals]);
  quizIndex = 0;
  renderQuestion();
}

function renderQuestion() {
  if (quizIndex >= quizQueue.length) { showQuizResults(); return; }

  quizAnswered = false;
  document.getElementById('nextBtn').style.display = 'none';
  document.getElementById('quizFeedback').textContent = '';
  document.getElementById('quizFeedback').className = 'quiz-feedback';

  const pct = (quizIndex / quizQueue.length) * 100;
  document.getElementById('quizProgress').style.width = pct + '%';

  const current = quizQueue[quizIndex];
  document.getElementById('quizAnimal').textContent = current.emoji;
  document.getElementById('quizAnimal').style.animation = 'none';
  setTimeout(() => document.getElementById('quizAnimal').style.animation = '', 10);

  // Random mode: sometimes ask by emoji, sometimes by word
  const mode = Math.random() > 0.4 ? 'emoji' : 'word';
  if (mode === 'word') {
    document.getElementById('quizQuestion').textContent = '¿Cómo se dice este animal?';
  } else {
    document.getElementById('quizQuestion').textContent = '¿Cuál es este animal?';
  }

  // 4 options: 1 correct + 3 wrong
  const wrong = shuffle(animals.filter(a => a.name !== current.name)).slice(0, 3);
  const options = shuffle([current, ...wrong]);

  const optDiv = document.getElementById('quizOptions');
  optDiv.innerHTML = '';
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'quiz-option';
    btn.textContent = opt.name;
    btn.onclick = () => checkAnswer(opt.name, current.name, btn);
    optDiv.appendChild(btn);
  });

  speak(current.name);
}

function checkAnswer(chosen, correct, btn) {
  if (quizAnswered) return;
  quizAnswered = true;

  const allBtns = document.querySelectorAll('.quiz-option');

  if (chosen === correct) {
    btn.classList.add('correct');
    document.getElementById('quizFeedback').textContent = '¡Muy bien! 🎉';
    document.getElementById('quizFeedback').className = 'quiz-feedback feedback-correct';
    totalCorrect++;
    totalStars++;
    speak('Excellent!');
    launchConfetti();
  } else {
    btn.classList.add('wrong');
    // Highlight correct
    allBtns.forEach(b => { if (b.textContent === correct) b.classList.add('correct'); });
    document.getElementById('quizFeedback').textContent = '¡Casi! La respuesta es: ' + correct;
    document.getElementById('quizFeedback').className = 'quiz-feedback feedback-wrong';
    speak(correct);
  }

  updateScore();
  allBtns.forEach(b => b.disabled = true);
  document.getElementById('nextBtn').style.display = 'block';
}

function nextQuestion() {
  quizIndex++;
  renderQuestion();
}

function showQuizResults() {
  const quizDiv = document.getElementById('screen-quiz');
  const stars = totalStars >= quizQueue.length ? '⭐⭐⭐' : totalStars >= quizQueue.length / 2 ? '⭐⭐' : '⭐';
  quizDiv.innerHTML = `
    <div class="results-box">
      <span class="results-emoji">${totalStars >= quizQueue.length ? '🏆' : '😊'}</span>
      <h2 class="results-title">${totalStars >= quizQueue.length ? '¡Perfecto!' : '¡Bien hecho!'}</h2>
      <p class="results-score">Acertaste ${totalCorrect} de ${quizQueue.length}</p>
      <div class="stars">${stars}</div>
      <button class="restart-btn" onclick="location.reload()">🔄 Jugar de nuevo</button>
    </div>
  `;
  if (totalStars >= quizQueue.length) launchConfetti();
}

// === MATCH GAME ===
let matchSelected = null;
let matchedPairs = 0;
let matchAttempts = 0;

function initMatch() {
  matchSelected = null;
  matchedPairs = 0;
  matchAttempts = 0;
  document.getElementById('matchResult').textContent = '';

  const subset = shuffle([...animals]).slice(0, 8);
  const emojis = subset.map(a => ({ id: a.name, content: a.emoji, type: 'emoji', label: a.name }));
  const words = subset.map(a => ({ id: a.name, content: a.name, type: 'word', label: a.name }));
  const cards = shuffle([...emojis, ...words]);

  const grid = document.getElementById('matchGrid');
  grid.innerHTML = '';
  cards.forEach((card, i) => {
    const div = document.createElement('div');
    div.className = 'match-card';
    div.dataset.id = card.id;
    div.dataset.type = card.type;
    div.dataset.idx = i;
    if (card.type === 'emoji') {
      div.innerHTML = `<span class="card-emoji">${card.content}</span>`;
    } else {
      div.textContent = card.content;
    }
    div.onclick = () => handleMatchClick(div, card);
    grid.appendChild(div);
  });
}

function handleMatchClick(div, card) {
  if (div.classList.contains('matched') || div.classList.contains('selected')) return;

  speak(card.label);
  div.classList.add('selected');

  if (!matchSelected) {
    matchSelected = { div, card };
    return;
  }

  matchAttempts++;
  const prev = matchSelected;
  matchSelected = null;

  if (prev.card.id === card.id && prev.card.type !== card.type) {
    // MATCH!
    setTimeout(() => {
      prev.div.classList.remove('selected');
      div.classList.remove('selected');
      prev.div.classList.add('matched');
      div.classList.add('matched');
      matchedPairs++;
      totalStars++;
      updateScore();
      launchConfetti(5);
      if (matchedPairs === 8) {
        setTimeout(() => {
          document.getElementById('matchResult').innerHTML =
            `🏆 ¡Completado en ${matchAttempts} intentos! <button class="restart-btn" onclick="initMatch()" style="display:inline-block;margin-left:15px;padding:10px 20px;font-size:1rem">🔄 Otra vez</button>`;
          launchConfetti();
        }, 400);
      }
    }, 200);
  } else {
    // NO MATCH
    prev.div.classList.add('wrong-flash');
    div.classList.add('wrong-flash');
    setTimeout(() => {
      prev.div.classList.remove('selected', 'wrong-flash');
      div.classList.remove('selected', 'wrong-flash');
    }, 600);
  }
}

// === UTILS ===
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function updateScore() {
  document.getElementById('totalStars').textContent = totalStars;
  document.getElementById('totalCorrect').textContent = totalCorrect;
}

const confettiColors = ['#e74c3c','#f39c12','#2ecc71','#3498db','#9b59b6','#f1c40f','#e91e8c','#1abc9c'];

function launchConfetti(count = 30) {
  for (let i = 0; i < count; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.left = Math.random() * 100 + 'vw';
      el.style.background = confettiColors[Math.floor(Math.random() * confettiColors.length)];
      el.style.animationDuration = (1.5 + Math.random() * 2) + 's';
      el.style.width = el.style.height = (6 + Math.random() * 10) + 'px';
      el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 4000);
    }, i * 60);
  }
}

// INIT
buildLearnScreen();
</script>
