<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Numbers Adventure! 🚀</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --sky: #1a1a2e;
    --star1: #e94560;
    --star2: #f5a623;
    --star3: #7ed6df;
    --star4: #badc58;
    --star5: #ff6b9d;
    --card-bg: #16213e;
    --text: #ffffff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    font-family: 'Nunito', sans-serif;
    background: var(--sky);
    overflow-x: hidden;
    color: var(--text);
  }

  /* Stars background */
  .stars {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none; z-index: 0;
    overflow: hidden;
  }
  .star {
    position: absolute;
    border-radius: 50%;
    animation: twinkle var(--dur, 3s) ease-in-out infinite alternate;
    background: white;
  }
  @keyframes twinkle {
    from { opacity: 0.2; transform: scale(1); }
    to   { opacity: 1;   transform: scale(1.4); }
  }

  /* Screens */
  .screen { display: none; position: relative; z-index: 1; }
  .screen.active {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh; min-height: 100dvh;
    width: 100%;
    padding: 20px;
    overflow-y: auto;
  }

  /* ===== MENU ===== */
  .logo {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(2.5rem, 8vw, 5rem);
    background: linear-gradient(135deg, #f5a623, #e94560, #7ed6df);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-align: center;
    animation: bounce 1.5s ease-in-out infinite alternate;
    margin-bottom: 8px;
  }
  @keyframes bounce {
    from { transform: translateY(0px); }
    to   { transform: translateY(-12px); }
  }
  .subtitle {
    font-size: 1.2rem; color: #aaa; margin-bottom: 40px; text-align: center;
  }

  .menu-btns { display: flex; flex-direction: column; gap: 16px; width: 100%; max-width: 400px; }

  .btn {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(1.1rem, 3vw, 1.5rem);
    padding: clamp(14px, 2vh, 18px) 30px;
    border: none; border-radius: 20px;
    cursor: pointer;
    transition: transform .15s, box-shadow .15s;
    box-shadow: 0 6px 0 rgba(0,0,0,0.4);
    position: relative; overflow: hidden;
    width: 100%;
  }
  .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 rgba(0,0,0,0.4); }
  .btn-orange { background: linear-gradient(135deg, #f5a623, #f08c00); color: #fff; }
  .btn-red    { background: linear-gradient(135deg, #e94560, #c0392b); color: #fff; }
  .btn-teal   { background: linear-gradient(135deg, #7ed6df, #22a6b3); color: #fff; }
  .btn-green  { background: linear-gradient(135deg, #badc58, #6ab04c); color: #fff; }
  .btn-pink   { background: linear-gradient(135deg, #ff6b9d, #c44569); color: #fff; }
  .btn-gray   { background: linear-gradient(135deg, #636e72, #2d3436); color: #fff; }

  .btn:hover { transform: translateY(-3px) scale(1.03); }

  .score-bar {
    display: flex; gap: 20px; margin-bottom: 24px;
    background: rgba(255,255,255,0.08);
    padding: 12px 28px; border-radius: 50px;
    font-size: clamp(0.9rem, 2vw, 1.1rem); font-weight: 700;
    flex-wrap: wrap; justify-content: center;
  }
  .score-item span { font-family: 'Fredoka One'; font-size: 1.4rem; color: var(--star2); }

  /* ===== LISTEN & MATCH ===== */
  .big-number {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(4rem, 15vw, 9rem);
    line-height: 1;
    color: var(--star2);
    text-shadow: 0 0 40px rgba(245,166,35,0.5);
    animation: popIn .4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    margin-bottom: 10px;
  }
  @keyframes popIn {
    from { transform: scale(0.3); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }

  .number-word {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(2rem, 8vw, 4rem);
    color: var(--star3);
    margin-bottom: 32px;
    letter-spacing: 2px;
  }

  .options-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
    width: 100%; max-width: 460px;
    margin-bottom: 24px;
  }
  .opt-btn {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(1.2rem, 3vw, 1.8rem);
    padding: clamp(14px, 2.5vh, 22px);
    border: 3px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    background: var(--card-bg);
    color: white;
    cursor: pointer;
    transition: all .2s;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    width: 100%;
  }
  .opt-btn:hover { transform: scale(1.07); border-color: var(--star2); }
  .opt-btn.correct {
    background: linear-gradient(135deg, #badc58, #6ab04c) !important;
    border-color: #badc58 !important;
    animation: shake-correct .4s;
  }
  .opt-btn.wrong {
    background: linear-gradient(135deg, #e94560, #c0392b) !important;
    border-color: #e94560 !important;
    animation: shake-wrong .4s;
  }
  @keyframes shake-correct {
    0%,100%{transform:scale(1)} 50%{transform:scale(1.15)}
  }
  @keyframes shake-wrong {
    0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)}
  }

  /* speak button */
  .speak-btn {
    font-size: 3rem; background: none; border: none;
    cursor: pointer; animation: pulse 2s infinite;
    filter: drop-shadow(0 0 10px rgba(126,214,223,0.7));
  }
  @keyframes pulse {
    0%,100%{transform:scale(1)} 50%{transform:scale(1.15)}
  }

  /* ===== FILL THE BLANK ===== */
  .blank-instruction {
    font-size: 1.2rem; color: #aaa; margin-bottom: 20px; text-align: center;
  }
  .blank-word {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(2rem, 7vw, 3.5rem);
    letter-spacing: 8px;
    color: var(--star3);
    background: rgba(255,255,255,0.07);
    padding: 16px 30px;
    border-radius: 16px;
    margin-bottom: 28px;
    min-width: 240px;
    text-align: center;
  }
  .letters-grid {
    display: flex; flex-wrap: wrap; gap: 10px;
    justify-content: center;
    max-width: 460px;
    width: 100%;
  }
  .letter-btn {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(1.2rem, 3vw, 1.6rem);
    width: clamp(48px, 8vw, 62px);
    height: clamp(48px, 8vw, 62px);
    border: none; border-radius: 14px;
    background: linear-gradient(135deg, #16213e, #0f3460);
    color: white;
    cursor: pointer;
    border: 2px solid rgba(255,255,255,0.15);
    transition: all .15s;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
  }
  .letter-btn:hover { transform: scale(1.1); border-color: var(--star2); }
  .letter-btn:disabled { opacity: 0.3; transform: none; cursor: default; }

  /* ===== MEMORY ===== */
  .memory-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(70px, 110px));
    gap: 10px;
    width: 100%;
    justify-content: center;
  }
  .mem-card {
    aspect-ratio: 1;
    border-radius: 14px;
    cursor: pointer;
    perspective: 600px;
    position: relative;
  }
  .mem-inner {
    width: 100%; height: 100%;
    transform-style: preserve-3d;
    transition: transform .4s;
    position: relative;
  }
  .mem-card.flipped .mem-inner { transform: rotateY(180deg); }
  .mem-front, .mem-back {
    position: absolute; inset: 0;
    backface-visibility: hidden;
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Fredoka One', cursive;
    font-size: 1.3rem;
    text-align: center;
    padding: 4px;
  }
  .mem-front {
    background: linear-gradient(135deg, #0f3460, #16213e);
    border: 2px solid rgba(255,255,255,0.1);
    font-size: 2rem;
    color: var(--star2);
  }
  .mem-back {
    background: linear-gradient(135deg, #7ed6df, #22a6b3);
    transform: rotateY(180deg);
    color: #1a1a2e;
    font-size: 1.1rem;
    line-height: 1.2;
  }
  .mem-card.matched .mem-inner { animation: matchPop .4s forwards; }
  @keyframes matchPop {
    0%{transform:rotateY(180deg) scale(1)}
    50%{transform:rotateY(180deg) scale(1.15)}
    100%{transform:rotateY(180deg) scale(1)}
  }
  .mem-card.matched .mem-back { background: linear-gradient(135deg, #badc58, #6ab04c); }

  /* ===== ORDER ===== */
  .order-target {
    display: flex; flex-wrap: wrap; gap: 8px;
    justify-content: center;
    min-height: 64px;
    background: rgba(255,255,255,0.05);
    border: 2px dashed rgba(255,255,255,0.2);
    border-radius: 16px;
    padding: 12px;
    max-width: 480px; width: 100%;
    margin-bottom: 20px;
  }
  .order-pool {
    display: flex; flex-wrap: wrap; gap: 8px;
    justify-content: center;
    max-width: 480px; width: 100%;
  }
  .order-tile {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(1rem, 2.5vw, 1.5rem);
    padding: 10px 14px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: all .15s;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    animation: tileIn .3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  @keyframes tileIn {
    from{transform:scale(0);opacity:0}
    to{transform:scale(1);opacity:1}
  }
  .order-tile.in-pool { background: linear-gradient(135deg, #f5a623, #f08c00); color: #fff; }
  .order-tile.in-target { background: linear-gradient(135deg, #16213e, #0f3460); color: #fff; border: 2px solid rgba(255,255,255,0.2); }
  .order-tile:hover { transform: scale(1.08); }

  /* ===== FEEDBACK ===== */
  .feedback {
    font-family: 'Fredoka One', cursive;
    font-size: 2rem;
    text-align: center;
    min-height: 48px;
    margin: 8px 0;
  }
  .feedback.good { color: #badc58; animation: popIn .3s; }
  .feedback.bad  { color: #e94560; animation: popIn .3s; }

  /* ===== RESULT ===== */
  .result-emoji { font-size: 6rem; animation: bounce 1s infinite alternate; }
  .result-title {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(2rem, 7vw, 3.5rem);
    background: linear-gradient(135deg, #f5a623, #e94560);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-align: center;
    margin: 16px 0 8px;
  }
  .result-score {
    font-size: 1.4rem; color: #aaa; margin-bottom: 32px; text-align: center;
  }
  .result-score strong { color: var(--star2); font-size: 2rem; }

  /* ===== PROGRESS BAR ===== */
  .progress-wrap {
    width: 100%; max-width: 420px;
    background: rgba(255,255,255,0.1);
    border-radius: 50px;
    height: 12px;
    margin-bottom: 20px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    border-radius: 50px;
    background: linear-gradient(90deg, #f5a623, #e94560);
    transition: width .4s ease;
  }

  /* confetti */
  .confetti-piece {
    position: fixed; width: 12px; height: 12px;
    border-radius: 3px;
    pointer-events: none; z-index: 999;
    animation: confettiFall var(--dur,1.5s) ease-in forwards;
  }
  @keyframes confettiFall {
    0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  /* back btn */
  .back-btn {
    position: absolute; top: 16px; left: 16px;
    font-family: 'Fredoka One'; font-size: 1.1rem;
    background: rgba(255,255,255,0.1);
    border: none; color: white;
    padding: 10px 18px; border-radius: 50px;
    cursor: pointer; z-index: 10;
    transition: background .2s;
  }
  .back-btn:hover { background: rgba(255,255,255,0.2); }

  /* mode title */
  .mode-title {
    font-family: 'Fredoka One';
    font-size: 1.5rem;
    color: var(--star3);
    margin-bottom: 16px;
    text-align: center;
  }

  /* Desktop wrapper */
  .screen.active > *:not(.stars) {
    max-width: 600px;
    width: 100%;
  }

  @media(max-width:400px) {
    .memory-grid { grid-template-columns: repeat(4,1fr); gap: 6px; }
    .mem-front,.mem-back { font-size: 1rem; }
    .letter-btn { width: 46px; height: 46px; font-size: 1.2rem; }
  }
</style>
</head>
<body>

<!-- Stars -->
<div class="stars" id="stars"></div>

<!-- ===== MENU ===== -->
<div class="screen active" id="screen-menu">
  <div class="logo">🔢 Numbers!</div>
  <p class="subtitle">Learn numbers 1–20 in English 🚀</p>
  <div class="menu-btns">
    <button class="btn btn-orange" onclick="startListen()">🔊 Listen & Choose</button>
    <button class="btn btn-teal"   onclick="startSpell()">✏️ Spell the Word</button>
    <button class="btn btn-pink"   onclick="startMemory()">🧠 Memory Game</button>
    <button class="btn btn-green"  onclick="startOrder()">📋 Put in Order</button>
  </div>
</div>

<!-- ===== LISTEN & CHOOSE ===== -->
<div class="screen" id="screen-listen">
  <button class="back-btn" onclick="goMenu()">← Back</button>
  <div class="score-bar">
    <div>⭐ Score: <span id="l-score">0</span></div>
    <div>📝 <span id="l-q">1</span>/10</div>
  </div>
  <div class="progress-wrap"><div class="progress-bar" id="l-prog" style="width:0%"></div></div>
  <p class="mode-title">What number is this? 🤔</p>
  <div class="big-number" id="l-number"></div>
  <button class="speak-btn" id="l-speak-btn" onclick="speakCurrent()">🔊</button>
  <div class="options-grid" id="l-options"></div>
  <div class="feedback" id="l-feedback"></div>
</div>

<!-- ===== SPELL THE WORD ===== -->
<div class="screen" id="screen-spell">
  <button class="back-btn" onclick="goMenu()">← Back</button>
  <div class="score-bar">
    <div>⭐ Score: <span id="s-score">0</span></div>
    <div>📝 <span id="s-q">1</span>/10</div>
  </div>
  <div class="progress-wrap"><div class="progress-bar" id="s-prog" style="width:0%"></div></div>
  <p class="mode-title">Spell the word! ✏️</p>
  <div class="big-number" id="s-number"></div>
  <div class="blank-word" id="s-blank"></div>
  <div class="letters-grid" id="s-letters"></div>
  <div class="feedback" id="s-feedback"></div>
</div>

<!-- ===== MEMORY ===== -->
<div class="screen" id="screen-memory">
  <button class="back-btn" onclick="goMenu()">← Back</button>
  <div class="score-bar">
    <div>🃏 Pairs: <span id="m-pairs">0</span>/8</div>
    <div>🔄 Tries: <span id="m-tries">0</span></div>
  </div>
  <p class="mode-title">Find the pairs! 🧠</p>
  <div class="memory-grid" id="memory-grid"></div>
</div>

<!-- ===== ORDER ===== -->
<div class="screen" id="screen-order">
  <button class="back-btn" onclick="goMenu()">← Back</button>
  <div class="score-bar">
    <div>⭐ Score: <span id="o-score">0</span></div>
    <div>🎯 Round: <span id="o-round">1</span>/5</div>
  </div>
  <div class="progress-wrap"><div class="progress-bar" id="o-prog" style="width:0%"></div></div>
  <p class="mode-title">Put the numbers in order! 📋</p>
  <p style="color:#aaa;font-size:.95rem;margin-bottom:12px;">Tap the words from smallest to largest ⬆️</p>
  <div class="order-target" id="order-target"></div>
  <div class="order-pool"   id="order-pool"></div>
  <div class="feedback" id="o-feedback"></div>
</div>

<!-- ===== RESULT ===== -->
<div class="screen" id="screen-result">
  <div class="result-emoji" id="res-emoji"></div>
  <div class="result-title" id="res-title"></div>
  <div class="result-score" id="res-score"></div>
  <button class="btn btn-orange" style="min-width:220px" onclick="goMenu()">🏠 Back to Menu</button>
</div>

<script>
// ===================== DATA =====================
const NUMS = [
  {n:1, w:'ONE'},   {n:2, w:'TWO'},   {n:3, w:'THREE'}, {n:4, w:'FOUR'},
  {n:5, w:'FIVE'},  {n:6, w:'SIX'},   {n:7, w:'SEVEN'}, {n:8, w:'EIGHT'},
  {n:9, w:'NINE'},  {n:10,w:'TEN'},   {n:11,w:'ELEVEN'},{n:12,w:'TWELVE'},
  {n:13,w:'THIRTEEN'},{n:14,w:'FOURTEEN'},{n:15,w:'FIFTEEN'},
  {n:16,w:'SIXTEEN'},{n:17,w:'SEVENTEEN'},{n:18,w:'EIGHTEEN'},
  {n:19,w:'NINETEEN'},{n:20,w:'TWENTY'}
];

// ===================== STARS =====================
(function(){
  const c = document.getElementById('stars');
  for(let i=0;i<80;i++){
    const s = document.createElement('div');
    s.className='star';
    const sz = Math.random()*3+1;
    s.style.cssText = `width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--dur:${2+Math.random()*3}s;animation-delay:${Math.random()*3}s`;
    c.appendChild(s);
  }
})();

// ===================== UTILS =====================
function shuffle(a){ return [...a].sort(()=>Math.random()-.5); }

function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function speak(text){
  if(!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang='en-US'; u.rate=0.85; u.pitch=1.1;
  window.speechSynthesis.speak(u);
}

function confetti(){
  const colors=['#f5a623','#e94560','#7ed6df','#badc58','#ff6b9d','#fff'];
  for(let i=0;i<60;i++){
    const el=document.createElement('div');
    el.className='confetti-piece';
    el.style.cssText=`left:${Math.random()*100}%;background:${colors[Math.floor(Math.random()*colors.length)]};--dur:${1+Math.random()*1.5}s;animation-delay:${Math.random()*.5}s`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),3000);
  }
}

function goMenu(){ show('screen-menu'); }

function showResult(score, total, mode){
  let emoji='😊', title='Good job!';
  const pct = score/total;
  if(pct===1){ emoji='🏆'; title='PERFECT! Amazing!'; confetti(); }
  else if(pct>=.7){ emoji='⭐'; title='Great work!'; }
  else if(pct>=.4){ emoji='👍'; title='Keep practicing!'; }
  else { emoji='💪'; title='Try again!'; }
  document.getElementById('res-emoji').textContent=emoji;
  document.getElementById('res-title').textContent=title;
  document.getElementById('res-score').innerHTML=`You got <strong>${score}</strong> out of ${total}!`;
  show('screen-result');
  if(pct>=.7) confetti();
}

// ===================== LISTEN & CHOOSE =====================
let lState={};
function startListen(){
  lState = { q:0, score:0, questions: shuffle(NUMS).slice(0,10) };
  show('screen-listen');
  listenNext();
}
function listenNext(){
  const s=lState;
  if(s.q>=s.questions.length){ showResult(s.score,s.questions.length,'listen'); return; }
  const cur = s.questions[s.q];
  document.getElementById('l-number').textContent = cur.n;
  document.getElementById('l-score').textContent  = s.score;
  document.getElementById('l-q').textContent      = s.q+1;
  document.getElementById('l-prog').style.width   = (s.q/s.questions.length*100)+'%';
  document.getElementById('l-feedback').textContent='';
  document.getElementById('l-feedback').className='feedback';

  // options: correct + 3 wrong
  let pool = shuffle(NUMS.filter(x=>x.n!==cur.n)).slice(0,3);
  let opts = shuffle([cur,...pool]);
  const grid = document.getElementById('l-options');
  grid.innerHTML='';
  opts.forEach(o=>{
    const b=document.createElement('button');
    b.className='opt-btn';
    b.textContent=o.w;
    b.onclick=()=>listenAnswer(b,o.n===cur.n,cur);
    grid.appendChild(b);
  });
  s.current=cur;
  setTimeout(()=>speak(String(cur.n)),300);
}
function speakCurrent(){ speak(String(lState.current.n)); }
function listenAnswer(btn, correct, cur){
  document.querySelectorAll('.opt-btn').forEach(b=>b.onclick=null);
  const fb=document.getElementById('l-feedback');
  if(correct){
    btn.classList.add('correct');
    fb.textContent='🎉 Correct! '+cur.w+'!';
    fb.className='feedback good';
    lState.score++;
    speak('Correct! '+cur.w);
    confetti();
  } else {
    btn.classList.add('wrong');
    fb.textContent='❌ It was '+cur.w+'!';
    fb.className='feedback bad';
    speak('The answer is '+cur.w);
    // show correct
    document.querySelectorAll('.opt-btn').forEach(b=>{
      if(b.textContent===cur.w) b.classList.add('correct');
    });
  }
  lState.q++;
  setTimeout(listenNext, 1600);
}

// ===================== SPELL THE WORD =====================
let sState={};
function startSpell(){
  sState = { q:0, score:0, questions: shuffle(NUMS).slice(0,10), typed:'' };
  show('screen-spell');
  spellNext();
}
function spellNext(){
  const s=sState;
  if(s.q>=s.questions.length){ showResult(s.score,s.questions.length,'spell'); return; }
  const cur=s.questions[s.q];
  s.current=cur; s.typed='';
  document.getElementById('s-number').textContent=cur.n;
  document.getElementById('s-score').textContent=s.score;
  document.getElementById('s-q').textContent=s.q+1;
  document.getElementById('s-prog').style.width=(s.q/s.questions.length*100)+'%';
  document.getElementById('s-feedback').textContent='';
  document.getElementById('s-feedback').className='feedback';
  updateBlank();

  // letter buttons: correct letters + extras
  const word=cur.w;
  const extras='AEIOULNRSTDCBGMPHWKFVYZ'.split('').filter(c=>!word.includes(c));
  let letters=shuffle([...new Set(word.split('')),...shuffle(extras).slice(0,5)]);
  const grid=document.getElementById('s-letters');
  grid.innerHTML='';
  letters.forEach(l=>{
    const b=document.createElement('button');
    b.className='letter-btn'; b.textContent=l;
    b.onclick=()=>typeLetter(l,b);
    grid.appendChild(b);
  });
  // backspace
  const back=document.createElement('button');
  back.className='letter-btn'; back.textContent='⌫'; back.id='s-back';
  back.onclick=backspaceLetter;
  grid.appendChild(back);
  speak(String(cur.n));
}
function updateBlank(){
  const s=sState; const word=s.current.w;
  let html='';
  for(let i=0;i<word.length;i++){
    html += (i<s.typed.length ? s.typed[i] : '_') + ' ';
  }
  document.getElementById('s-blank').textContent=html.trim();
}
function typeLetter(l,btn){
  const s=sState; const word=s.current.w;
  if(s.typed.length>=word.length) return;
  s.typed+=l;
  updateBlank();
  if(s.typed.length===word.length){
    const fb=document.getElementById('s-feedback');
    // disable all
    document.querySelectorAll('.letter-btn').forEach(b=>b.disabled=true);
    if(s.typed===word){
      fb.textContent='🎉 Perfect! '+word+'!';
      fb.className='feedback good';
      s.score++;
      speak('Perfect! '+word);
      confetti();
    } else {
      fb.textContent='❌ It was '+word+'!';
      fb.className='feedback bad';
      speak('The word is '+word);
    }
    s.q++;
    setTimeout(spellNext,1700);
  }
}
function backspaceLetter(){
  const s=sState;
  if(s.typed.length>0){ s.typed=s.typed.slice(0,-1); updateBlank(); }
}

// ===================== MEMORY =====================
let memState={};
function startMemory(){
  // pick 8 numbers
  const nums = shuffle(NUMS).slice(0,8);
  const cards = shuffle([...nums.map(x=>({...x,type:'num'})), ...nums.map(x=>({...x,type:'word'}))]);
  memState={ cards, flipped:[], matched:[], tries:0 };
  show('screen-memory');
  renderMemory();
}
function renderMemory(){
  const s=memState;
  const grid=document.getElementById('memory-grid');
  grid.innerHTML='';
  s.cards.forEach((c,i)=>{
    const div=document.createElement('div');
    div.className='mem-card'+(s.matched.includes(i)?' flipped matched':'');
    div.innerHTML=`<div class="mem-inner"><div class="mem-front">⭐</div><div class="mem-back">${c.type==='num'?c.n:c.w}</div></div>`;
    if(!s.matched.includes(i)) div.onclick=()=>flipCard(i);
    grid.appendChild(div);
  });
  document.getElementById('m-pairs').textContent=s.matched.length/2;
  document.getElementById('m-tries').textContent=s.tries;
}
function flipCard(i){
  const s=memState;
  if(s.flipped.length===2||s.flipped.includes(i)) return;
  s.flipped.push(i);
  // visually flip
  document.querySelectorAll('.mem-card')[i].classList.add('flipped');
  if(s.flipped.length===2){
    s.tries++;
    const [a,b]=s.flipped;
    const ca=s.cards[a], cb=s.cards[b];
    const match = ca.n===cb.n && ca.type!==cb.type;
    setTimeout(()=>{
      if(match){
        s.matched.push(a,b);
        speak(String(ca.n)+'. '+ca.w);
        if(s.matched.length===s.cards.length){
          confetti();
          setTimeout(()=>showResult(8,8,'memory'),800);
        }
      } else {
        document.querySelectorAll('.mem-card')[a].classList.remove('flipped');
        document.querySelectorAll('.mem-card')[b].classList.remove('flipped');
      }
      s.flipped=[];
      renderMemory();
    },900);
  }
}

// ===================== ORDER =====================
let oState={};
function startOrder(){
  oState={ round:0, score:0, rounds: buildOrderRounds() };
  show('screen-order');
  orderNext();
}
function buildOrderRounds(){
  let rounds=[];
  for(let r=0;r<5;r++){
    const start=Math.floor(Math.random()*16)+1;
    const picks=[];
    for(let i=start;i<start+5&&i<=20;i++) picks.push(NUMS[i-1]);
    rounds.push(shuffle(picks));
  }
  return rounds;
}
function orderNext(){
  const s=oState;
  if(s.round>=s.rounds.length){ showResult(s.score,s.rounds.length,'order'); return; }
  const items=s.rounds[s.round];
  s.pool=[...items]; s.target=[];
  document.getElementById('o-score').textContent=s.score;
  document.getElementById('o-round').textContent=s.round+1;
  document.getElementById('o-prog').style.width=(s.round/s.rounds.length*100)+'%';
  document.getElementById('o-feedback').textContent='';
  renderOrder();
}
function renderOrder(){
  const s=oState;
  const tgt=document.getElementById('order-target');
  const pool=document.getElementById('order-pool');
  tgt.innerHTML=''; pool.innerHTML='';
  s.target.forEach((item,i)=>{
    const b=document.createElement('button');
    b.className='order-tile in-target'; b.textContent=item.w;
    b.onclick=()=>removeFromTarget(i);
    tgt.appendChild(b);
  });
  s.pool.forEach((item,i)=>{
    const b=document.createElement('button');
    b.className='order-tile in-pool'; b.textContent=item.w;
    b.onclick=()=>addToTarget(i);
    pool.appendChild(b);
  });
}
function addToTarget(i){
  const s=oState;
  const item=s.pool.splice(i,1)[0];
  s.target.push(item);
  speak(item.w);
  renderOrder();
  if(s.pool.length===0) checkOrder();
}
function removeFromTarget(i){
  const s=oState;
  const item=s.target.splice(i,1)[0];
  s.pool.push(item);
  renderOrder();
}
function checkOrder(){
  const s=oState;
  const correct = s.target.map(x=>x.n).every((n,i,a)=>i===0||n>a[i-1]);
  const fb=document.getElementById('o-feedback');
  if(correct){
    fb.textContent='🎉 Correct order!';
    fb.className='feedback good';
    s.score++;
    speak('Correct!');
    confetti();
  } else {
    fb.textContent='❌ Try again!';
    fb.className='feedback bad';
    // reset
    s.pool=[...s.rounds[s.round]].sort(()=>Math.random()-.5);
    s.target=[];
    setTimeout(()=>{
      fb.textContent=''; renderOrder();
    },1200);
    return;
  }
  s.round++;
  setTimeout(orderNext,1500);
}
</script>
